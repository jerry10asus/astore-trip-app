<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="AStore Trip" />
  <title>AStore Trip - 首頁</title>
  <link rel="icon" type="image/png" href="./assets/app_icon.png" />
  <link rel="apple-touch-icon" href="./assets/app_icon.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KHSHX4ZW1D"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KHSHX4ZW1D');
  </script>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/glass.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/pwa-update.css" />
  <link rel="stylesheet" href="./css/pwa-install.css" />
</head>
<body>
  <!-- Header -->
  <header class="page-header">
    <h1 class="page-title">首頁</h1>
    <a href="./about.html" class="info-btn" aria-label="資訊">
      <img src="./assets/icon/info.svg" alt="資訊" class="info-icon" />
    </a>
  </header>

  <main class="home-main">
    <!-- 成就卡片 -->
    <section class="achievement-card liquid-glass" onclick="openAchievementsSheet()">
      <div class="achievement-header">
        <span class="achievement-label">成就</span>
        <img src="./assets/icon/arrow_right.svg" alt="前往" class="achievement-arrow" />
      </div>
      <div class="achievement-stats">
        <span>累計造訪 <span class="highlight-blue" id="visitedCount">3</span> 間 / 獲得 <span class="highlight-orange" id="badgeCount">2</span> 枚勳章</span>
      </div>
    </section>

    <!-- 經典產品展示 -->
    <section class="product-showcase" style="display: none;">
      <div class="product-image-wrapper">
        <img id="productImage" src="./assets/placeholders/imac-1998.png" alt="Product" class="product-image" />
      </div>
      <div class="product-info">
        <div id="productYear" class="product-year">1998</div>
        <div id="productName" class="product-name">iMac</div>
      </div>
    </section>

    <!-- 最近的Apple Store -->
    <section class="nearest-store-card liquid-glass">
      <div class="nearest-store-header">
        <div>
          <h3 class="nearest-store-title">最近的Apple Store</h3>
          <p class="nearest-store-subtitle">信義A13</p>
        </div>
        <button class="go-btn">前往</button>
      </div>
      <div class="store-map-container">
        <div class="store-map liquid-glass" id="nearestStoreMapContainer">
          <!-- Google Map iframe 將由 JavaScript 動態生成 -->
        </div>
      </div>
    </section>

    <!-- 精選門市 -->
    <section class="featured-stores">
      <h3 class="featured-stores-title">精選門市</h3>
      <div class="featured-stores-scroll" id="featuredList">
        <div class="featured-store-card">
          <img src="./assets/placeholders/store-1.jpg" alt="信義 A13" />
          <div class="featured-store-info">
            <h4>信義 A13</h4>
            <p><span class="pin-icon">📍</span> 台灣</p>
          </div>
        </div>
        <div class="featured-store-card">
          <img src="assets/placeholders/store-1.jpg" alt="福岡" />
          <div class="featured-store-info">
            <h4>福岡</h4>
            <p><span class="pin-icon">📍</span> 日本</p>
          </div>
        </div>
        <div class="featured-store-card">
          <img src="assets/placeholders/store-1.jpg" alt="表參道" />
          <div class="featured-store-info">
            <h4>表參道</h4>
            <p><span class="pin-icon">📍</span> 日本</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 底部導覽列 -->
  <nav class="bottom-nav liquid-glass">
    <a href="./index.html" class="nav-item active">
      <span class="nav-icon"><img src="./assets/icon/home.svg" alt="首頁" /></span>
      <span class="nav-label">首頁</span>
    </a>
    <a href="./stores.html" class="nav-item">
      <span class="nav-icon"><img src="./assets/icon/apple.svg" alt="門市" /></span>
      <span class="nav-label">門市</span>
    </a>
    <a href="./favorites.html" class="nav-item">
      <span class="nav-icon"><img src="./assets/icon/favorites.svg" alt="收藏" /></span>
      <span class="nav-label">收藏</span>
    </a>
  </nav>

  <script src="./js/data.js"></script>
  <script src="./js/main.js"></script>
  <script src="./js/pwa-update.js"></script>
  <script src="./js/pwa-install.js"></script>
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered:', reg))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }

    function openAchievementsSheet() {
      window.location.href = './achievements.html';
    }
  </script>
</body>
</html>
